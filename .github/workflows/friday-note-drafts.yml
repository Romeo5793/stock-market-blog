name: Friday note drafts

# 金曜 15:30 JST（= 06:30 UTC）に note 無料/有料の下書きを生成して push する。
# ローカル側は docs/drafts/pending/manifest.json の status=pending を検知して公開する想定。

on:
  schedule:
    - cron: "30 6 * * 5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stock-market-blog-friday-note-drafts
  cancel-in-progress: false

jobs:
  generate-note-drafts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate free + paid note drafts
        run: python3 scripts/render_note_draft.py
        env:
          TZ: Asia/Tokyo

      - name: Commit and push drafts
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/drafts docs/rankings/history
          if git diff --cached --quiet; then
            echo "No draft changes to commit."
            exit 0
          fi
          git commit -m "docs: 週次 note 下書き（無料+有料）を自動生成する。"
          git push
