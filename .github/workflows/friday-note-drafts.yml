name: Friday note drafts

# 金曜 15:40 JST（= 06:40 UTC）に note 無料/有料の下書きを生成して push する。
# 直前 15:00 の Friday ranking refresh（stock-marketing-bot）後の新しい順位を使う。
# ローカル側は docs/drafts/pending/manifest.json の status=pending を検知して公開する想定。

on:
  schedule:
    - cron: "40 6 * * 5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stock-market-blog-friday-note-drafts
  cancel-in-progress: false

jobs:
  generate-note-drafts:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Wait for fresh rankings from bot publish
        env:
          TZ: Asia/Tokyo
        run: |
          set -e
          # ranking refresh は 15:00。最大約10分リトライして pull
          for i in $(seq 1 10); do
            git fetch origin main
            git reset --hard origin/main
            if python3 - <<'PY'
          from datetime import datetime
          from pathlib import Path
          import json
          import sys
          data = json.loads(Path("docs/rankings/jp-top20.json").read_text())
          dt = datetime.fromisoformat(str(data.get("updated_at")))
          age = (datetime.now() - dt).total_seconds() / 3600
          print(f"jp_ranking_age_hours={age:.3f} updated_at={data.get('updated_at')}")
          sys.exit(0 if age <= 8.0 else 1)
          PY
            then
              echo "Fresh rankings ready (attempt=$i)"
              exit 0
            fi
            echo "Rankings still stale; waiting 60s... (attempt=$i)"
            sleep 60
          done
          echo "Timed out waiting for fresh rankings."
          exit 1

      - name: Generate free + paid note drafts
        id: generate
        run: |
          set +e
          python3 scripts/render_note_draft.py --require-fresh-hours 8
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" = "3" ]; then
            echo "Rankings unchanged vs history — skip commit."
            exit 0
          fi
          exit "$code"
        env:
          TZ: Asia/Tokyo

      - name: Commit and push drafts
        if: steps.generate.outputs.exit_code != '3'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/drafts docs/rankings/history
          if git diff --cached --quiet; then
            echo "No draft changes to commit."
            exit 0
          fi
          git commit -m "docs: 週次 note 下書き（無料+有料）を自動生成する。"
          git push
